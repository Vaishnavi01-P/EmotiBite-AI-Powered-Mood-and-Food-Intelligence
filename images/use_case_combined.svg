<svg width="900" height="750" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="100%" height="100%" fill="white" />

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
    <marker id="open-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,6 L0,12" fill="none" stroke="#333" />
    </marker>
     <marker id="inheritance" markerWidth="14" markerHeight="14" refX="14" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 z" fill="white" stroke="#333" />
    </marker>
    <marker id="dashed-arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
    
    <!-- Actor Template -->
    <g id="actor">
      <circle cx="0" cy="-20" r="10" stroke="#333" stroke-width="2" fill="white" />
      <line x1="0" y1="-10" x2="0" y2="20" stroke="#333" stroke-width="2" />
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#333" stroke-width="2" />
      <line x1="0" y1="20" x2="-12" y2="45" stroke="#333" stroke-width="2" />
      <line x1="0" y1="20" x2="12" y2="45" stroke="#333" stroke-width="2" />
    </g>
  </defs>

  <!-- Title omitted to match paper style typically -->
  
  <!-- System Boundary -->
  <rect x="250" y="20" width="400" height="700" fill="none" stroke="#333" stroke-width="2" />
  <text x="450" y="40" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">EmotiBite System</text>

  <!-- LEFT ACTORS -->
  <!-- End User -->
  <g transform="translate(100, 80)">
    <use href="#actor" />
    <text x="0" y="60" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">End User</text>
  </g>
  
  <!-- Guest User -->
  <g transform="translate(100, 220)">
    <use href="#actor" />
    <text x="0" y="60" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Guest User</text>
  </g>
  
  <!-- Registered User -->
  <g transform="translate(100, 450)">
    <use href="#actor" />
    <text x="0" y="60" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Registered</text>
    <text x="0" y="75" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">User</text>
  </g>

  <!-- Inheritance Lines -->
  <!-- Guest -> End User -->
  <line x1="100" y1="180" x2="100" y2="125" stroke="#333" stroke-width="1.5" marker-end="url(#inheritance)" />
  <!-- Registered -> Guest User -->
  <line x1="100" y1="410" x2="100" y2="270" stroke="#333" stroke-width="1.5" marker-end="url(#inheritance)" />

  <!-- USE CASES (Ovals) -->
  <g id="uc-register" transform="translate(450, 80)">
    <ellipse cx="0" cy="0" rx="90" ry="20" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Register Account</text>
  </g>

  <g id="uc-login" transform="translate(450, 140)">
    <ellipse cx="0" cy="0" rx="90" ry="20" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Login</text>
  </g>

  <g id="uc-log-text" transform="translate(450, 200)">
    <ellipse cx="0" cy="0" rx="90" ry="20" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Log Mood (Text)</text>
  </g>

  <g id="uc-log-voice" transform="translate(450, 260)">
    <ellipse cx="0" cy="0" rx="90" ry="20" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Log Mood (Voice)</text>
  </g>

  <g id="uc-view-recs" transform="translate(400, 320)"> <!-- Shifted left slightly -->
    <ellipse cx="0" cy="0" rx="95" ry="20" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="0" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">View Recipe</text>
    <text x="0" y="12" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Recommendations</text>
  </g>

  <g id="uc-search" transform="translate(400, 380)">
    <ellipse cx="0" cy="0" rx="90" ry="20" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="0" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Search Pantry</text>
    <text x="0" y="12" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Recipes</text>
  </g>

  <g id="uc-save" transform="translate(400, 440)">
    <ellipse cx="0" cy="0" rx="90" ry="20" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Save Recipe to Favorites</text>
  </g>
  
  <g id="uc-earn" transform="translate(580, 380)"> <!-- Positioned to right of search -->
    <ellipse cx="0" cy="0" rx="60" ry="25" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="0" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Earn Coins</text>
    <text x="0" y="15" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">and Badges</text>
  </g>

  <g id="uc-dashboard" transform="translate(450, 500)">
    <ellipse cx="0" cy="0" rx="90" ry="20" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="0" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">View Gamification</text>
    <text x="0" y="12" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Dashboard</text>
  </g>

  <g id="uc-streak" transform="translate(450, 560)">
    <ellipse cx="0" cy="0" rx="90" ry="20" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Maintain Daily Streak</text>
  </g>

  <g id="uc-history" transform="translate(450, 620)">
    <ellipse cx="0" cy="0" rx="90" ry="20" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">View Mood History</text>
  </g>

  <g id="uc-logout" transform="translate(450, 680)">
    <ellipse cx="0" cy="0" rx="70" ry="15" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Logout</text>
  </g>
  
  <!-- ADMIN USE CASES -->
  <g id="uc-manage-recipes" transform="translate(550, 550) rotate(0)"> <!-- Note: Moved for layout -->
    <!-- Re-checking user image. They are distinct lists. Admin ones are separated bottom right? No, they are just below in the list. -->
    <!-- Actually in image, Admin points to separate bubbles. Let's put them right side. -->
  </g>
  
  <g id="uc-manage" transform="translate(580, 560)">
     <ellipse cx="0" cy="0" rx="70" ry="15" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Manage Recipes</text>
  </g>
    <g id="uc-tags" transform="translate(580, 610)">
     <ellipse cx="0" cy="0" rx="70" ry="15" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">Update Nutrient Tags</text>
  </g>
    <g id="uc-analytics" transform="translate(580, 660)">
     <ellipse cx="0" cy="0" rx="70" ry="15" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">View System Analytics</text>
  </g>

  <!-- External Systems -->
  <rect x="750" y="180" width="100" height="40" fill="white" stroke="#333" stroke-width="1.5" />
  <text x="800" y="205" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">AI Service</text>
  
  <rect x="750" y="250" width="100" height="40" fill="white" stroke="#333" stroke-width="1.5" />
  <text x="800" y="265" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Browser</text>
  <text x="800" y="280" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Speech API</text>
  
  <!-- Right Actor: Admin -->
  <g transform="translate(800, 550)">
    <use href="#actor" />
    <text x="0" y="60" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Administrator</text>
  </g>


  <!-- CONNECTION LINES -->
  
  <!-- Guest User -->
  <line x1="130" y1="220" x2="360" y2="80" stroke="#333" stroke-width="1.5" /> <!-- Guest -> Register -->
  <line x1="130" y1="220" x2="360" y2="140" stroke="#333" stroke-width="1.5" /> <!-- Guest -> Login -->
  
  <!-- Registered User -->
  <line x1="130" y1="450" x2="360" y2="200" stroke="#333" stroke-width="1.5" /> <!-- Reg -> Log Text -->
  <line x1="130" y1="450" x2="360" y2="260" stroke="#333" stroke-width="1.5" /> <!-- Reg -> Log Voice -->
  <line x1="130" y1="450" x2="310" y2="330" stroke="#333" stroke-width="1.5" /> <!-- Reg -> View Recs -->
  <line x1="130" y1="450" x2="310" y2="380" stroke="#333" stroke-width="1.5" /> <!-- Reg -> Search Pantry -->
  <line x1="130" y1="450" x2="310" y2="440" stroke="#333" stroke-width="1.5" /> <!-- Reg -> Save Fav -->
  <line x1="130" y1="450" x2="360" y2="500" stroke="#333" stroke-width="1.5" /> <!-- Reg -> Dashboard -->
  <line x1="130" y1="450" x2="360" y2="560" stroke="#333" stroke-width="1.5" /> <!-- Reg -> Streak -->
  <line x1="130" y1="450" x2="360" y2="620" stroke="#333" stroke-width="1.5" /> <!-- Reg -> History -->
  <line x1="130" y1="450" x2="380" y2="680" stroke="#333" stroke-width="1.5" /> <!-- Reg -> Logout -->
  
  <!-- Admin -->
  <line x1="770" y1="550" x2="650" y2="560" stroke="#333" stroke-width="1.5" /> <!-- Admin -> Manage -->
  <line x1="770" y1="550" x2="650" y2="610" stroke="#333" stroke-width="1.5" /> <!-- Admin -> Tags -->
  <line x1="770" y1="550" x2="650" y2="660" stroke="#333" stroke-width="1.5" /> <!-- Admin -> Analytics -->

  <!-- Include/Extend Lines (Dashed with Open Arrow) -->
  
  <!-- Voice includes Text -->
  <!-- <path d="M450,240 L450,225" stroke="#333" stroke-width="1" stroke-dasharray="5,5" marker-end="url(#open-arrow)" /> -->
  <!-- Better path for visibility -->
   <line x1="450" y1="240" x2="450" y2="228" stroke="#333" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#dashed-arrow)"/>
   <text x="455" y="235" font-family="Arial" font-size="10" transform="rotate(0)"> &lt;&lt;include&gt;&gt;</text>
   
   <!-- External Systems (Dashed Lines) -->
   <line x1="540" y1="200" x2="750" y2="200" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" /> 
   <line x1="540" y1="260" x2="750" y2="270" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" />

   <!-- Arrows to Earn Coins -->
   <!-- View Recs -> Earn Coins (include) -->
   <line x1="490" y1="330" x2="550" y2="360" stroke="#333" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#dashed-arrow)" />
   <text x="510" y="340" font-family="Arial" font-size="9">&lt;&lt;include&gt;&gt;</text>
   
   <!-- Search Pantry -> Earn Coins (extend) -->
   <line x1="490" y1="380" x2="520" y2="380" stroke="#333" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#dashed-arrow)" />
   <text x="495" y="375" font-family="Arial" font-size="9">&lt;&lt;extend&gt;&gt;</text>
   
   <!-- Save Fav -> Earn Coins (include) -->
   <line x1="490" y1="440" x2="550" y2="400" stroke="#333" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#dashed-arrow)" />
   <text x="520" y="435" font-family="Arial" font-size="9">&lt;&lt;include&gt;&gt;</text>

</svg>
