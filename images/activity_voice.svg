<svg width="600" height="1100" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="100%" height="100%" fill="white" />
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>

  <text x="300" y="30" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Activity Diagram: Voice Mood Logging</text>

  <!-- Start -->
  <circle cx="300" cy="50" r="10" fill="#333" />
  <line x1="300" y1="60" x2="300" y2="80" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="200" y="80" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="300" y="105" font-family="Arial" font-size="11" text-anchor="middle">Click Microphone</text>
  <line x1="300" y1="120" x2="300" y2="150" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Decision: Browser Support -->
  <polygon points="300,150 400,190 300,230 200,190" fill="#fff" stroke="#333" stroke-width="1.5" />
  <text x="300" y="195" font-family="Arial" font-size="11" text-anchor="middle">Browser Support?</text>

  <!-- No Support -->
  <text x="180" y="180" font-family="Arial" font-size="10" text-anchor="end">No</text>
  <line x1="200" y1="190" x2="125" y2="190" stroke="#333" stroke-width="1.5" />
  <line x1="125" y1="190" x2="125" y2="230" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  
  <rect x="50" y="230" width="150" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="125" y="255" font-family="Arial" font-size="11" text-anchor="middle">Show "Use Text Input"</text>
  
  <circle cx="125" cy="310" r="10" fill="#333" />
  <circle cx="125" cy="310" r="14" fill="none" stroke="#333" stroke-width="2" />
  <line x1="125" y1="270" x2="125" y2="296" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Yes Support -->
  <text x="310" y="245" font-family="Arial" font-size="10" text-anchor="start">Yes</text>
  <line x1="300" y1="230" x2="300" y2="260" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  
  <rect x="200" y="260" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="300" y="285" font-family="Arial" font-size="11" text-anchor="middle">Request Permission</text>
  <line x1="300" y1="300" x2="300" y2="330" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Decision: Permission -->
  <polygon points="300,330 400,370 300,410 200,370" fill="#fff" stroke="#333" stroke-width="1.5" />
  <text x="300" y="375" font-family="Arial" font-size="11" text-anchor="middle">Permission Granted?</text>

  <!-- No Permission -->
  <text x="180" y="360" font-family="Arial" font-size="10" text-anchor="end">No</text>
  <line x1="200" y1="370" x2="125" y2="370" stroke="#333" stroke-width="1.5" />
  <line x1="125" y1="370" x2="125" y2="270" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" /> <!-- To Use Text Input -->

  <!-- Listening -->
  <text x="310" y="425" font-family="Arial" font-size="10" text-anchor="start">Yes</text>
  <line x1="300" y1="410" x2="300" y2="440" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="200" y="440" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="300" y="465" font-family="Arial" font-size="11" text-anchor="middle">Listening (Pulsing Icon)</text>
  <line x1="300" y1="480" x2="300" y2="510" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="200" y="510" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="300" y="535" font-family="Arial" font-size="11" text-anchor="middle">Interpret Speech</text>
  <line x1="300" y1="550" x2="300" y2="580" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Decision: Speech Detected? -->
  <polygon points="300,580 400,620 300,660 200,620" fill="#fff" stroke="#333" stroke-width="1.5" />
  <text x="300" y="625" font-family="Arial" font-size="11" text-anchor="middle">Speech Detected?</text>

  <!-- Loop back (No speech) -->
  <text x="180" y="610" font-family="Arial" font-size="10" text-anchor="end">No (Retry)</text>
  <line x1="200" y1="620" x2="150" y2="620" stroke="#333" stroke-width="1.5" />
  <line x1="150" y1="620" x2="150" y2="100" stroke="#333" stroke-width="1.5" />
  <line x1="150" y1="100" x2="200" y2="100" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Yes Detected -->
  <text x="310" y="675" font-family="Arial" font-size="10" text-anchor="start">Yes</text>
  <line x1="300" y1="660" x2="300" y2="690" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Decision: Confidence -->
  <polygon points="300,690 400,730 300,770 200,730" fill="#fff" stroke="#333" stroke-width="1.5" />
  <text x="300" y="735" font-family="Arial" font-size="11" text-anchor="middle">Confidence &gt;= 60%?</text>

  <!-- Low Confidence -->
  <text x="180" y="720" font-family="Arial" font-size="10" text-anchor="end">No</text>
  <line x1="200" y1="730" x2="140" y2="730" stroke="#333" stroke-width="1.5" />
  <line x1="140" y1="730" x2="140" y2="770" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  
  <rect x="50" y="770" width="180" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="140" y="795" font-family="Arial" font-size="11" text-anchor="middle">Show Warning / Edit</text>
  <line x1="140" y1="810" x2="140" y2="850" stroke="#333" stroke-width="1.5" />
  <line x1="140" y1="850" x2="250" y2="850" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Populate -->
  <text x="310" y="785" font-family="Arial" font-size="10" text-anchor="start">Yes</text>
  <line x1="300" y1="770" x2="300" y2="830" stroke="#333" stroke-width="1.5" />
  <line x1="300" y1="830" x2="350" y2="830" stroke="#333" stroke-width="1.5" />
  
  <rect x="250" y="830" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="350" y="855" font-family="Arial" font-size="11" text-anchor="middle">Populate Text Field</text>
  <line x1="350" y1="870" x2="350" y2="900" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Trigger Analysis -->
  <rect x="250" y="900" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="350" y="925" font-family="Arial" font-size="11" text-anchor="middle">Trigger Mood Analysis</text>
  <line x1="350" y1="940" x2="350" y2="970" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- End 2 -->
  <circle cx="350" cy="980" r="10" fill="#333" />
  <circle cx="350" cy="980" r="14" fill="none" stroke="#333" stroke-width="2" />

</svg>
