<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="900" viewBox="0 0 1000 900">
  <!-- Background -->
  <rect width="1000" height="900" fill="#ffffff" />
  
  <!-- Title -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">EmotiBite Database Entity-Relationship Diagram (MongoDB Schema)</text>

  <!-- USER Table -->
  <g transform="translate(50, 100)">
    <rect width="220" height="280" fill="#f8f9fa" stroke="#333" stroke-width="2" rx="10" />
    <rect width="220" height="40" fill="#e9ecef" stroke="#333" stroke-width="2" rx="10" clip-path="inset(0 0 10 0)" />
    <text x="110" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">users</text>
    
    <text x="10" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold">PK: _id (ObjectId)</text>
    <text x="10" y="85" font-family="Arial, sans-serif" font-size="14">UK: email (String)</text>
    <text x="10" y="105" font-family="Arial, sans-serif" font-size="14">name (String)</text>
    <text x="10" y="125" font-family="Arial, sans-serif" font-size="14">password (String)</text>
    <text x="10" y="145" font-family="Arial, sans-serif" font-size="14">coins (Number)</text>
    <text x="10" y="165" font-family="Arial, sans-serif" font-size="14">currentStreak (Number)</text>
    <text x="10" y="185" font-family="Arial, sans-serif" font-size="14">badges (Array)</text>
    <text x="10" y="205" font-family="Arial, sans-serif" font-size="14">lastMoodLog (Date)</text>
    <text x="10" y="225" font-family="Arial, sans-serif" font-size="14">createdAt (Date)</text>
    <text x="10" y="245" font-family="Arial, sans-serif" font-size="14">updatedAt (Date)</text>
  </g>

  <!-- MOOD_LOG Table -->
  <g transform="translate(450, 100)">
    <rect width="220" height="200" fill="#f8f9fa" stroke="#333" stroke-width="2" rx="10" />
    <rect width="220" height="40" fill="#e9ecef" stroke="#333" stroke-width="2" rx="10" clip-path="inset(0 0 10 0)" />
    <text x="110" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">moodLogs</text>
    
    <text x="10" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold">PK: _id (ObjectId)</text>
    <text x="10" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold">FK: userId (ObjectId)</text>
    <text x="10" y="105" font-family="Arial, sans-serif" font-size="14">mood (String)</text>
    <text x="10" y="125" font-family="Arial, sans-serif" font-size="14">confidence (Number)</text>
    <text x="10" y="145" font-family="Arial, sans-serif" font-size="14">text (String)</text>
    <text x="10" y="165" font-family="Arial, sans-serif" font-size="14">nutrients (Array)</text>
    <text x="10" y="185" font-family="Arial, sans-serif" font-size="14">timestamp (Date)</text>
  </g>

  <!-- RECIPE Table -->
  <g transform="translate(50, 500)">
    <rect width="220" height="260" fill="#f8f9fa" stroke="#333" stroke-width="2" rx="10" />
    <rect width="220" height="40" fill="#e9ecef" stroke="#333" stroke-width="2" rx="10" clip-path="inset(0 0 10 0)" />
    <text x="110" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">recipes</text>
    
    <text x="10" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold">PK: _id (ObjectId)</text>
    <text x="10" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold">UK: title (String)</text>
    <text x="10" y="105" font-family="Arial, sans-serif" font-size="14">ingredients (Array)</text>
    <text x="10" y="125" font-family="Arial, sans-serif" font-size="14">instructions (Array)</text>
    <text x="10" y="145" font-family="Arial, sans-serif" font-size="14">nutrients (Array)</text>
    <text x="10" y="165" font-family="Arial, sans-serif" font-size="14">dietaryFlags (Array)</text>
    <text x="10" y="185" font-family="Arial, sans-serif" font-size="14">difficulty (String)</text>
    <text x="10" y="205" font-family="Arial, sans-serif" font-size="14">prepTime (Number)</text>
    <text x="10" y="225" font-family="Arial, sans-serif" font-size="14">rating (Number)</text>
    <text x="10" y="245" font-family="Arial, sans-serif" font-size="14">createdAt (Date)</text>
  </g>

  <!-- SAVED_RECIPE Junction Table -->
  <g transform="translate(450, 500)">
    <rect width="220" height="120" fill="#f8f9fa" stroke="#333" stroke-width="2" rx="10" />
    <rect width="220" height="40" fill="#e9ecef" stroke="#333" stroke-width="2" rx="10" clip-path="inset(0 0 10 0)" />
    <text x="110" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">savedRecipes</text>
    
    <text x="10" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold">PK/FK: userId (ObjectId)</text>
    <text x="10" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold">PK/FK: recipeId (ObjectId)</text>
    <text x="10" y="105" font-family="Arial, sans-serif" font-size="14">savedAt (Date)</text>
  </g>

  <!-- Relationships -->
  
  <!-- users (1) - logs - (M) moodLogs -->
  <line x1="270" y1="240" x2="450" y2="200" stroke="#333" stroke-width="2" />
  <circle cx="270" cy="240" r="4" fill="#333" />
  <path d="M 440 190 L 450 200 L 440 210" fill="none" stroke="#333" stroke-width="2" />
  <text x="320" y="210" font-family="Arial, sans-serif" font-size="12">1 : M</text>
  <text x="320" y="225" font-family="Arial, sans-serif" font-size="12">logs</text>

  <!-- users (1) - saves - (M) savedRecipes (via userId) -->
  <line x1="160" y1="380" x2="160" y2="440" stroke="#333" stroke-width="2" />
  <line x1="160" y1="440" x2="450" y2="560" stroke="#333" stroke-width="2" />
  <circle cx="160" cy="380" r="4" fill="#333" />
  <path d="M 440 550 L 450 560 L 440 570" fill="none" stroke="#333" stroke-width="2" />
  <text x="250" y="480" font-family="Arial, sans-serif" font-size="12">1 : M</text>

  <!-- recipes (1) - saved by - (M) savedRecipes (via recipeId) -->
  <line x1="270" y1="630" x2="450" y2="560" stroke="#333" stroke-width="2" />
  <circle cx="270" cy="630" r="4" fill="#333" />
  <path d="M 440 550 L 450 560 L 440 570" fill="none" stroke="#333" stroke-width="2" />
  <text x="320" y="605" font-family="Arial, sans-serif" font-size="12">1 : M</text>

  <!-- Legend -->
  <g transform="translate(750, 100)">
    <rect width="200" height="120" fill="#fff" stroke="#333" stroke-width="1" rx="5" />
    <text x="100" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Legend</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="14">PK: Primary Key</text>
    <text x="10" y="75" font-family="Arial, sans-serif" font-size="14">FK: Foreign Key</text>
    <text x="10" y="95" font-family="Arial, sans-serif" font-size="14">UK: Unique Key</text>
  </g>

</svg>
