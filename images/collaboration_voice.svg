<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="100%" height="100%" fill="white" />
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>

  <text x="400" y="30" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Collaboration Diagram: Voice Mood Logging</text>

  <!-- OBJECTS -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="100" height="40" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
    <text x="50" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">:User</text>
  </g>

  <g transform="translate(250, 300)">
    <rect x="0" y="0" width="120" height="40" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
    <text x="60" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">:VoiceRecorder</text>
  </g>

  <!-- SpeechAPI (Top) -->
  <g transform="translate(250, 100)">
    <rect x="0" y="0" width="120" height="40" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
    <text x="60" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">:SpeechAPI</text>
  </g>

  <g transform="translate(450, 300)">
    <rect x="0" y="0" width="100" height="40" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
    <text x="50" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">:MoodForm</text>
  </g>

  <g transform="translate(600, 300)">
    <rect x="0" y="0" width="120" height="40" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
    <text x="60" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">:MoodController</text>
  </g>
  
  <g transform="translate(600, 450)">
    <rect x="0" y="0" width="120" height="40" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
    <text x="60" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">:AIService</text>
  </g>

  <!-- LINKS -->
  
  <!-- User - VoiceRecorder -->
  <line x1="150" y1="320" x2="250" y2="320" stroke="#333" stroke-width="1.5" />
  <path d="M180,310 L200,310" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="200" y="300" font-family="Arial" font-size="10" text-anchor="middle">1. clickMicrophone()</text>

  <!-- VoiceRecorder - SpeechAPI -->
  <line x1="310" y1="300" x2="310" y2="140" stroke="#333" stroke-width="1.5" />
  
  <!-- 2. request -->
  <path d="M300,240 L300,220" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="290" y="230" font-family="Arial" font-size="10" text-anchor="end">2. request()</text>
  <!-- 5. granted -->
  <path d="M320,220 L320,240" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="330" y="230" font-family="Arial" font-size="10" text-anchor="start">5. granted()</text>
  <!-- 6. start -->
  <path d="M300,190 L300,170" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="290" y="180" font-family="Arial" font-size="10" text-anchor="end">6. start()</text>
  <!-- 9. result -->
  <path d="M320,170 L320,190" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="330" y="180" font-family="Arial" font-size="10" text-anchor="start">9. result</text>

  <!-- SpeechAPI Loop (8) -->
  <path d="M370,110 L400,110 L400,130 L370,130" fill="none" stroke="#333" stroke-width="1.5" />
  <text x="430" y="125" font-family="Arial" font-size="10" text-anchor="start">8. transcribe()</text>

  <!-- SpeechAPI - User (Permission flow) -->
  <line x1="100" y1="300" x2="250" y2="120" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" />
  <text x="130" y="210" font-family="Arial" font-size="10" fill="#555">3. prompt / 4. grant / 7. speak</text>

  <!-- VoiceRecorder - MoodForm -->
  <line x1="370" y1="320" x2="450" y2="320" stroke="#333" stroke-width="1.5" />
  <path d="M390,310 L410,310" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="410" y="300" font-family="Arial" font-size="10" text-anchor="middle">10. populate()</text>
  
  <!-- MoodForm - Controller -->
  <line x1="550" y1="320" x2="600" y2="320" stroke="#333" stroke-width="1.5" />
  <path d="M560,310 L580,310" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="575" y="300" font-family="Arial" font-size="10" text-anchor="middle">11. analyze()</text>

  <!-- Controller - AI -->
  <line x1="660" y1="340" x2="660" y2="450" stroke="#333" stroke-width="1.5" />
  <path d="M650,380 L650,400" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="640" y="390" font-family="Arial" font-size="10" text-anchor="end">12. invoke</text>

</svg>
