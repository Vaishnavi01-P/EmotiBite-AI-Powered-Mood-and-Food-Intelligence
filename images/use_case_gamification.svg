<svg width="600" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid White Background -->
  <rect width="100%" height="100%" fill="white" />

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
    <marker id="dash-arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
    <g id="actor">
      <circle cx="0" cy="-20" r="10" stroke="#333" stroke-width="2" fill="white" />
      <line x1="0" y1="-10" x2="0" y2="20" stroke="#333" stroke-width="2" />
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#333" stroke-width="2" />
      <line x1="0" y1="20" x2="-12" y2="45" stroke="#333" stroke-width="2" />
      <line x1="0" y1="20" x2="12" y2="45" stroke="#333" stroke-width="2" />
    </g>
  </defs>

  <text x="300" y="30" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Gamification &amp; Admin Use Case Diagram</text>

  <!-- System Boundary Boxes -->
  <rect x="200" y="60" width="250" height="280" rx="5" ry="5" fill="white" stroke="#666" stroke-width="2" />
  <text x="210" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Gamification</text>

  <rect x="200" y="360" width="250" height="100" rx="5" ry="5" fill="white" stroke="#666" stroke-width="2" />
  <text x="210" y="380" font-family="Arial" font-size="12" font-weight="bold" fill="#666">Administration</text>

  <!-- Actors -->
  <g transform="translate(100, 200)">
    <use href="#actor" />
    <text x="0" y="65" font-family="Arial" font-size="12" text-anchor="middle">User</text>
  </g>

  <g transform="translate(500, 410)">
    <use href="#actor" />
    <text x="0" y="65" font-family="Arial" font-size="12" text-anchor="middle">Admin</text>
  </g>

  <!-- Use Cases -->
  <g transform="translate(325, 120)">
    <ellipse cx="0" cy="0" rx="75" ry="30" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="12" text-anchor="middle">View Dashboard</text>
  </g>
  
  <g transform="translate(325, 200)">
    <ellipse cx="0" cy="0" rx="75" ry="30" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="12" text-anchor="middle">Earn Coins/Badges</text>
  </g>

  <g transform="translate(325, 280)">
    <ellipse cx="0" cy="0" rx="75" ry="30" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="12" text-anchor="middle">View Mood History</text>
  </g>

  <g transform="translate(325, 410)">
    <ellipse cx="0" cy="0" rx="75" ry="30" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="12" text-anchor="middle">Manage Recipes</text>
  </g>

  <!-- Connections -->
  <line x1="120" y1="200" x2="250" y2="120" stroke="#333" stroke-width="1.5" />
  <line x1="120" y1="200" x2="250" y2="280" stroke="#333" stroke-width="1.5" />
  
  <!-- Admin Connection -->
  <line x1="480" y1="410" x2="400" y2="410" stroke="#333" stroke-width="1.5" />

  <!-- Automaton Arrow -->
  <text x="170" y="200" font-family="Arial" font-size="10" fill="#555" font-style="italic">(Automatic)</text>
  <line x1="170" y1="205" x2="250" y2="205" stroke="#555" stroke-width="1" stroke-dasharray="4" marker-end="url(#dash-arrow)"/>

</svg>
