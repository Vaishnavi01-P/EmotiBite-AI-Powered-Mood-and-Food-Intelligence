<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid White Background -->
  <rect width="100%" height="100%" fill="white" />
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
    <marker id="dash-arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>

  <text x="400" y="30" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Sequence Diagram: Voice-Based Mood Logging</text>

  <!-- Lifelines -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="80" height="30" fill="#f0f0f0" stroke="#333" stroke-width="1.5" />
    <text x="40" y="20" font-family="Arial" font-size="12" text-anchor="middle">User</text>
    <line x1="40" y1="30" x2="40" y2="550" stroke="#333" stroke-width="1" stroke-dasharray="5,5" />
  </g>

  <g transform="translate(180, 60)">
    <rect x="0" y="0" width="80" height="30" fill="#f0f0f0" stroke="#333" stroke-width="1.5" />
    <text x="40" y="20" font-family="Arial" font-size="12" text-anchor="middle">Frontend</text>
    <line x1="40" y1="30" x2="40" y2="550" stroke="#333" stroke-width="1" stroke-dasharray="5,5" />
    <!-- Activation Bar -->
    <rect x="35" y="50" width="10" height="480" fill="#eee" stroke="#666" stroke-width="1" />
  </g>

  <g transform="translate(310, 60)">
    <rect x="0" y="0" width="100" height="30" fill="#f0f0f0" stroke="#333" stroke-width="1.5" />
    <text x="50" y="20" font-family="Arial" font-size="12" text-anchor="middle">Browser API</text>
    <line x1="50" y1="30" x2="50" y2="550" stroke="#333" stroke-width="1" stroke-dasharray="5,5" />
  </g>

  <g transform="translate(460, 60)">
    <rect x="0" y="0" width="80" height="30" fill="#f0f0f0" stroke="#333" stroke-width="1.5" />
    <text x="40" y="20" font-family="Arial" font-size="12" text-anchor="middle">Backend</text>
    <line x1="40" y1="30" x2="40" y2="550" stroke="#333" stroke-width="1" stroke-dasharray="5,5" />
  </g>

  <g transform="translate(590, 60)">
    <rect x="0" y="0" width="80" height="30" fill="#f0f0f0" stroke="#333" stroke-width="1.5" />
    <text x="40" y="20" font-family="Arial" font-size="12" text-anchor="middle">AI Service</text>
    <line x1="40" y1="30" x2="40" y2="550" stroke="#333" stroke-width="1" stroke-dasharray="5,5" />
  </g>
  
  <g transform="translate(720, 60)">
    <rect x="0" y="0" width="80" height="30" fill="#f0f0f0" stroke="#333" stroke-width="1.5" />
    <text x="40" y="20" font-family="Arial" font-size="12" text-anchor="middle">Database</text>
    <line x1="40" y1="30" x2="40" y2="550" stroke="#333" stroke-width="1" stroke-dasharray="5,5" />
  </g>

  <!-- Messages -->
  <!-- 1. Click Mic -->
  <line x1="90" y1="110" x2="215" y2="110" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="152" y="105" font-family="Arial" font-size="11" text-anchor="middle">clickMicrophone()</text>

  <!-- 2. Check Support (Self) -->
  <path d="M225,120 L245,120 L245,130 L225,130" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="260" y="125" font-family="Arial" font-size="11" text-anchor="start">checkSupport()</text>

  <!-- 3. Request Permission -->
  <line x1="225" y1="150" x2="360" y2="150" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="292" y="145" font-family="Arial" font-size="11" text-anchor="middle">requestPermission()</text>

  <!-- 4. Grant Permission -->
  <line x1="90" y1="170" x2="360" y2="170" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="225" y="165" font-family="Arial" font-size="11" text-anchor="middle">grantPermission()</text>
  
  <!-- 5. Granted -->
  <line x1="360" y1="190" x2="225" y2="190" stroke="#333" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#dash-arrow)" />
  <text x="292" y="185" font-family="Arial" font-size="11" text-anchor="middle">permissionGranted()</text>

  <!-- 6. Start -->
  <line x1="225" y1="220" x2="360" y2="220" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="292" y="215" font-family="Arial" font-size="11" text-anchor="middle">recognition.start()</text>

  <!-- 7. Speak -->
  <line x1="90" y1="240" x2="360" y2="240" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="225" y="235" font-family="Arial" font-size="11" text-anchor="middle">speak("...")</text>
  
  <!-- 8. Process (Self) -->
  <path d="M370,250 L390,250 L390,260 L370,260" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="405" y="260" font-family="Arial" font-size="11" text-anchor="start">processAudio()</text>

  <!-- 9. Result -->
  <line x1="360" y1="280" x2="225" y2="280" stroke="#333" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#dash-arrow)" />
  <text x="292" y="275" font-family="Arial" font-size="11" text-anchor="middle">onResult(text)</text>

  <!-- 10. Populate (Self) -->
  <path d="M225,290 L245,290 L245,300 L225,300" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="260" y="300" font-family="Arial" font-size="11" text-anchor="start">populateField()</text>

  <!-- 11. Analyze -->
  <line x1="225" y1="330" x2="500" y2="330" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="362" y="325" font-family="Arial" font-size="11" text-anchor="middle">POST /analyze</text>
  
  <!-- Backend -> AI -->
  <line x1="500" y1="360" x2="630" y2="360" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="565" y="355" font-family="Arial" font-size="11" text-anchor="middle">analyze(text)</text>
  
  <!-- AI -> Backend -->
  <line x1="630" y1="390" x2="500" y2="390" stroke="#333" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#dash-arrow)" />
  <text x="565" y="385" font-family="Arial" font-size="11" text-anchor="middle">{mood...}</text>

  <!-- Backend -> DB -->
  <line x1="500" y1="420" x2="760" y2="420" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="630" y="415" font-family="Arial" font-size="11" text-anchor="middle">storeMood()</text>
  
  <!-- DB -> Backend -->
  <line x1="760" y1="450" x2="500" y2="450" stroke="#333" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#dash-arrow)" />
  <text x="630" y="445" font-family="Arial" font-size="11" text-anchor="middle">success</text>

  <!-- Backend -> Frontend -->
  <line x1="500" y1="480" x2="225" y2="480" stroke="#333" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#dash-arrow)" />
  <text x="362" y="475" font-family="Arial" font-size="11" text-anchor="middle">response{...}</text>

</svg>
