<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid White Background -->
  <rect width="100%" height="100%" fill="white" />
  
  <defs>
    <!-- Arrowhead marker -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
    <!-- Actor Template -->
    <g id="actor">
      <circle cx="0" cy="-20" r="10" stroke="#333" stroke-width="2" fill="white" />
      <line x1="0" y1="-10" x2="0" y2="20" stroke="#333" stroke-width="2" />
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#333" stroke-width="2" />
      <line x1="0" y1="20" x2="-12" y2="45" stroke="#333" stroke-width="2" />
      <line x1="0" y1="20" x2="12" y2="45" stroke="#333" stroke-width="2" />
    </g>
  </defs>

  <!-- Title -->
  <text x="300" y="30" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Authentication Use Case Diagram</text>

  <!-- System Boundary Box -->
  <rect x="200" y="50" width="300" height="320" rx="5" ry="5" fill="white" stroke="#666" stroke-width="2" />
  <text x="350" y="75" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#666">Authentication System</text>

  <!-- Actors -->
  <g transform="translate(100, 150)">
    <use href="#actor" />
    <text x="0" y="65" font-family="Arial" font-size="12" text-anchor="middle">Guest User</text>
  </g>
  
  <g transform="translate(100, 300)">
    <use href="#actor" />
    <text x="0" y="65" font-family="Arial" font-size="12" text-anchor="middle">Reg. User</text>
  </g>

  <!-- Use Cases -->
  <g transform="translate(350, 130)">
    <ellipse cx="0" cy="0" rx="70" ry="30" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="12" text-anchor="middle">Register Account</text>
  </g>

  <g transform="translate(350, 210)">
    <ellipse cx="0" cy="0" rx="70" ry="30" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="12" text-anchor="middle">Login</text>
  </g>

  <g transform="translate(350, 290)">
    <ellipse cx="0" cy="0" rx="70" ry="30" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="12" text-anchor="middle">Manage Session</text>
  </g>

  <!-- Connections -->
  <!-- Guest User to Register -->
  <line x1="120" y1="150" x2="280" y2="130" stroke="#333" stroke-width="1.5" />
  <!-- Guest User to Login -->
  <line x1="120" y1="150" x2="280" y2="210" stroke="#333" stroke-width="1.5" />
  <!-- Registered User to Manage Session -->
  <line x1="120" y1="300" x2="280" y2="290" stroke="#333" stroke-width="1.5" />

</svg>
