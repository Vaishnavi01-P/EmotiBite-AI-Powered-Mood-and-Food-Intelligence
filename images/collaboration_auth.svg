<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="100%" height="100%" fill="white" />

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>

  <text x="400" y="30" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Collaboration Diagram: User Authentication</text>

  <!-- OBJECTS -->
  
  <!-- User -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="100" height="40" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
    <text x="50" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">:User</text>
  </g>

  <!-- LoginForm -->
  <g transform="translate(250, 250)">
    <rect x="0" y="0" width="100" height="40" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
    <text x="50" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">:LoginForm</text>
  </g>

  <!-- AuthController -->
  <g transform="translate(450, 250)">
    <rect x="0" y="0" width="120" height="40" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
    <text x="60" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">:AuthController</text>
  </g>

  <!-- UserRepository (Top) -->
  <g transform="translate(450, 100)">
    <rect x="0" y="0" width="120" height="40" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
    <text x="60" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">:UserRepository</text>
  </g>

  <!-- PasswordService (Right) -->
  <g transform="translate(650, 250)">
    <rect x="0" y="0" width="120" height="40" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
    <text x="60" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">:PasswordService</text>
  </g>

  <!-- TokenService (Bottom) -->
  <g transform="translate(450, 400)">
    <rect x="0" y="0" width="120" height="40" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
    <text x="60" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">:TokenService</text>
  </g>

  <!-- LINKS & MESSAGES -->

  <!-- User - LoginForm -->
  <line x1="150" y1="270" x2="250" y2="270" stroke="#333" stroke-width="1.5" />
  <!-- 1. enterCredentials -->
  <path d="M180,260 L200,260" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="200" y="250" font-family="Arial" font-size="10" text-anchor="middle">1. enterCredentials()</text>
  <!-- 2. submitLogin -->
  <path d="M180,285 L200,285" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="200" y="295" font-family="Arial" font-size="10" text-anchor="middle">2. submitLogin()</text>
  <!-- 12. redirectToDashboard -->
  <path d="M220,285 L200,285" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="200" y="310" font-family="Arial" font-size="10" text-anchor="middle">12. redirectToDashboard()</text>

  <!-- LoginForm - AuthController -->
  <line x1="350" y1="270" x2="450" y2="270" stroke="#333" stroke-width="1.5" />
  <!-- 3. login -->
  <path d="M380,260 L400,260" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="400" y="250" font-family="Arial" font-size="10" text-anchor="middle">3. login()</text>
  <!-- 10. return token -->
  <path d="M420,285 L400,285" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="400" y="295" font-family="Arial" font-size="10" text-anchor="middle">10. return {token...}</text>

  <!-- AuthController - UserRepository -->
  <line x1="510" y1="250" x2="510" y2="140" stroke="#333" stroke-width="1.5" />
  <!-- 4. findByEmail -->
  <path d="M500,210 L500,190" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="490" y="200" font-family="Arial" font-size="10" text-anchor="end">4. findByEmail()</text>
  <!-- 5. return user -->
  <path d="M520,190 L520,210" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="530" y="200" font-family="Arial" font-size="10" text-anchor="start">5. return user</text>

  <!-- AuthController - PasswordService -->
  <line x1="570" y1="270" x2="650" y2="270" stroke="#333" stroke-width="1.5" />
  <!-- 6. comparePassword -->
  <path d="M590,260 L610,260" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="610" y="250" font-family="Arial" font-size="10" text-anchor="middle">6. comparePassword()</text>
  <!-- 7. return isMatch -->
  <path d="M630,285 L610,285" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="610" y="295" font-family="Arial" font-size="10" text-anchor="middle">7. isMatch</text>

  <!-- AuthController - TokenService -->
  <line x1="510" y1="290" x2="510" y2="400" stroke="#333" stroke-width="1.5" />
  <!-- 8. generateToken -->
  <path d="M500,330 L500,350" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="490" y="340" font-family="Arial" font-size="10" text-anchor="end">8. generateToken()</text>
  <!-- 9. return token -->
  <path d="M520,350 L520,330" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="530" y="340" font-family="Arial" font-size="10" text-anchor="start">9. return token</text>

  <!-- Self Loop for LoginForm (11. storeToken) -->
  <path d="M300,290 L300,310 L330,310 L330,290" fill="none" stroke="#333" stroke-width="1.5" />
  <path d="M325,295 L330,290" fill="none" stroke="#333" stroke-width="1" /> <!-- pseudo arrow -->
  <text x="315" y="325" font-family="Arial" font-size="10" text-anchor="middle">11. storeToken()</text>

</svg>
