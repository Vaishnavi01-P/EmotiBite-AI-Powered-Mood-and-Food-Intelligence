<svg width="600" height="1100" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="100%" height="100%" fill="white" />
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>

  <text x="300" y="30" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Activity Diagram: Pantry Recipe Search</text>

  <!-- Start -->
  <circle cx="300" cy="50" r="10" fill="#333" />
  <line x1="300" y1="60" x2="300" y2="80" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="200" y="80" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="300" y="105" font-family="Arial" font-size="11" text-anchor="middle">Enter Ingredients and Find</text>
  <line x1="300" y1="120" x2="300" y2="150" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Decision: Empty? -->
  <polygon points="300,150 380,190 300,230 220,190" fill="#fff" stroke="#333" stroke-width="1.5" />
  <text x="300" y="195" font-family="Arial" font-size="11" text-anchor="middle">Input Empty?</text>

  <!-- Loop back -->
  <text x="210" y="180" font-family="Arial" font-size="10" text-anchor="end">Yes</text>
  <line x1="220" y1="190" x2="150" y2="190" stroke="#333" stroke-width="1.5" />
  <line x1="150" y1="190" x2="150" y2="100" stroke="#333" stroke-width="1.5" />
  <line x1="150" y1="100" x2="200" y2="100" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Process -->
  <text x="310" y="245" font-family="Arial" font-size="10" text-anchor="start">No</text>
  <line x1="300" y1="230" x2="300" y2="260" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="200" y="260" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="300" y="285" font-family="Arial" font-size="11" text-anchor="middle">Tokenize and Remove Stopwords</text>
  <line x1="300" y1="300" x2="300" y2="330" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  
  <rect x="200" y="330" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="300" y="355" font-family="Arial" font-size="11" text-anchor="middle">POST /api/recipes/pantry</text>
  <line x1="300" y1="370" x2="300" y2="400" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="200" y="400" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="300" y="425" font-family="Arial" font-size="11" text-anchor="middle">Query DB and Calculate Scores</text>
  <line x1="300" y1="440" x2="300" y2="470" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Decision: >= 50% -->
  <polygon points="300,470 400,510 300,550 200,510" fill="#fff" stroke="#333" stroke-width="1.5" />
  <text x="300" y="515" font-family="Arial" font-size="11" text-anchor="middle">Any &gt;= 50%?</text>

  <!-- No >= 50% -->
  <text x="190" y="500" font-family="Arial" font-size="10" text-anchor="end">No</text>
  <line x1="200" y1="510" x2="120" y2="510" stroke="#333" stroke-width="1.5" />
  <line x1="120" y1="510" x2="120" y2="550" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  
  <rect x="50" y="550" width="140" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="120" y="575" font-family="Arial" font-size="11" text-anchor="middle">Relax Threshold (30%)</text>
  <line x1="120" y1="590" x2="120" y2="620" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  
  <!-- Decision: >= 30% -->
  <polygon points="120,620 200,660 120,700 40,660" fill="#fff" stroke="#333" stroke-width="1.5" />
  <text x="120" y="665" font-family="Arial" font-size="11" text-anchor="middle">Any &gt;= 30%?</text>
  
  <!-- No Matches -->
  <text x="30" y="650" font-family="Arial" font-size="10" text-anchor="end">No</text>
  <line x1="40" y1="660" x2="20" y2="660" stroke="#333" stroke-width="1.5" />
  <line x1="20" y1="660" x2="20" y2="730" stroke="#333" stroke-width="1.5" />
  <line x1="20" y1="730" x2="50" y2="750" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  
  <rect x="50" y="730" width="140" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="120" y="755" font-family="Arial" font-size="11" text-anchor="middle">Return Empty/Msg</text>

  <!-- Filter & Sort (Join point) -->
  <rect x="300" y="730" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="400" y="755" font-family="Arial" font-size="11" text-anchor="middle">Filter and Sort Descending</text>
  
  <!-- Paths to Filter -->
  <text x="310" y="565" font-family="Arial" font-size="10" text-anchor="start">Yes</text>
  <line x1="300" y1="550" x2="300" y2="730" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" /> <!-- Yes 50% -->
  
  <text x="210" y="650" font-family="Arial" font-size="10" text-anchor="start">Yes</text>
  <line x1="200" y1="660" x2="250" y2="660" stroke="#333" stroke-width="1.5" />
  <line x1="250" y1="660" x2="320" y2="730" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" /> <!-- Yes 30% -->

  <!-- Display -->
  <rect x="300" y="800" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="400" y="825" font-family="Arial" font-size="11" text-anchor="middle">Display Recipe Cards</text>
  <line x1="400" y1="770" x2="400" y2="800" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- End -->
  <circle cx="300" cy="900" r="10" fill="#333" />
  <circle cx="300" cy="900" r="14" fill="none" stroke="#333" stroke-width="2" />
  
  <line x1="120" y1="770" x2="120" y2="850" stroke="#333" stroke-width="1.5" />
  <line x1="120" y1="850" x2="286" y2="900" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  
  <line x1="400" y1="840" x2="400" y2="870" stroke="#333" stroke-width="1.5" />
  <line x1="400" y1="870" x2="314" y2="900" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

</svg>
