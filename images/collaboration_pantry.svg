<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="100%" height="100%" fill="white" />
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>

  <text x="400" y="30" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Collaboration Diagram: Pantry Recipe Search</text>

  <!-- OBJECTS -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="100" height="40" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
    <text x="50" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">:User</text>
  </g>

  <g transform="translate(250, 250)">
    <rect x="0" y="0" width="100" height="40" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
    <text x="50" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">:PantryForm</text>
  </g>

  <g transform="translate(450, 250)">
    <rect x="0" y="0" width="120" height="40" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
    <text x="60" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">:RecipeController</text>
  </g>

  <!-- RecipeRepository (Top) -->
  <g transform="translate(450, 100)">
    <rect x="0" y="0" width="120" height="40" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
    <text x="60" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">:RecipeRepo</text>
  </g>

  <!-- MatchingService (Bottom) -->
  <g transform="translate(450, 400)">
    <rect x="0" y="0" width="120" height="40" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
    <text x="60" y="25" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">:MatchingService</text>
  </g>

  <!-- LINKS -->
  <!-- User - PantryForm -->
  <line x1="150" y1="270" x2="250" y2="270" stroke="#333" stroke-width="1.5" />
  <path d="M180,260 L200,260" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="200" y="250" font-family="Arial" font-size="10" text-anchor="middle">1. enterIngredients()</text>
  <path d="M180,275 L200,275" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="200" y="270" font-family="Arial" font-size="10" text-anchor="middle">2. clickSearch()</text>
  <!-- 14. display -->
  <path d="M220,290 L200,290" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="200" y="305" font-family="Arial" font-size="10" text-anchor="middle">14. displayCards()</text>

  <!-- PantryForm Loop -->
  <path d="M280,290 L280,320 L320,320 L320,290" fill="none" stroke="#333" stroke-width="1.5" />
  <text x="300" y="335" font-family="Arial" font-size="10" text-anchor="middle">3. tokenize()</text>

  <!-- PantryForm - RecipeController -->
  <line x1="350" y1="270" x2="450" y2="270" stroke="#333" stroke-width="1.5" />
  <path d="M380,260 L400,260" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="400" y="250" font-family="Arial" font-size="10" text-anchor="middle">4. search()</text>
  <path d="M420,285 L400,285" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="400" y="295" font-family="Arial" font-size="10" text-anchor="middle">13. return recipes</text>

  <!-- Controller - Repo -->
  <line x1="510" y1="250" x2="510" y2="140" stroke="#333" stroke-width="1.5" />
  <path d="M500,210 L500,190" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="490" y="200" font-family="Arial" font-size="10" text-anchor="end">5. findByIngredients()</text>
  <path d="M520,190 L520,210" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="530" y="200" font-family="Arial" font-size="10" text-anchor="start">6. return all</text>

  <!-- Controller - MatchingService -->
  <line x1="510" y1="290" x2="510" y2="400" stroke="#333" stroke-width="1.5" />
  <path d="M500,330 L500,350" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="490" y="340" font-family="Arial" font-size="10" text-anchor="end">7. calcScores()</text>
  <path d="M520,350 L520,330" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="530" y="340" font-family="Arial" font-size="10" text-anchor="start">10. return scored</text>

  <!-- MatchingService Loop (8, 9) -->
  <path d="M570,410 L600,410 L600,430 L570,430" fill="none" stroke="#333" stroke-width="1.5" />
  <text x="640" y="425" font-family="Arial" font-size="10" text-anchor="start">8,9. compute()</text>

  <!-- Controller Loop (11, 12) -->
  <path d="M570,260 L600,260 L600,280 L570,280" fill="none" stroke="#333" stroke-width="1.5" />
  <text x="610" y="275" font-family="Arial" font-size="10" text-anchor="start">11,12. filter/sort</text>

</svg>
