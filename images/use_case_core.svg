<svg width="800" height="550" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid White Background -->
  <rect width="100%" height="100%" fill="white" />

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
    <marker id="dash-arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
    <g id="actor">
      <circle cx="0" cy="-20" r="10" stroke="#333" stroke-width="2" fill="white" />
      <line x1="0" y1="-10" x2="0" y2="20" stroke="#333" stroke-width="2" />
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#333" stroke-width="2" />
      <line x1="0" y1="20" x2="-12" y2="45" stroke="#333" stroke-width="2" />
      <line x1="0" y1="20" x2="12" y2="45" stroke="#333" stroke-width="2" />
    </g>
  </defs>

  <text x="400" y="30" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Core Interactions Use Case Diagram</text>

  <!-- System Boundary Box -->
  <rect x="250" y="50" width="300" height="460" rx="5" ry="5" fill="white" stroke="#666" stroke-width="2" />
  <text x="400" y="75" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#666">Core Features</text>

  <!-- Actors -->
  <g transform="translate(100, 250)">
    <use href="#actor" />
    <text x="0" y="65" font-family="Arial" font-size="12" text-anchor="middle">User</text>
  </g>

  <g transform="translate(700, 150)">
    <rect x="-20" y="-30" width="40" height="60" fill="white" stroke="#333" stroke-width="2"/>
    <text x="0" y="-45" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">&lt;&lt;Actor&gt;&gt;</text>
    <text x="0" y="45" font-family="Arial" font-size="12" text-anchor="middle">AI Service</text>
    <text x="0" y="5" font-family="Arial" font-size="10" text-anchor="middle">System</text>
  </g>

  <g transform="translate(700, 350)">
    <rect x="-20" y="-30" width="40" height="60" fill="white" stroke="#333" stroke-width="2"/>
    <text x="0" y="-45" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">&lt;&lt;Actor&gt;&gt;</text>
    <text x="0" y="45" font-family="Arial" font-size="12" text-anchor="middle">BrowserAPI</text>
    <text x="0" y="5" font-family="Arial" font-size="10" text-anchor="middle">System</text>
  </g>

  <!-- Use Cases -->
  <g transform="translate(400, 120)">
    <ellipse cx="0" cy="0" rx="80" ry="30" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="12" text-anchor="middle">Log Mood (Text)</text>
  </g>

  <g transform="translate(400, 200)">
    <ellipse cx="0" cy="0" rx="80" ry="30" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="12" text-anchor="middle">Log Mood (Voice)</text>
  </g>

  <g transform="translate(400, 280)">
    <ellipse cx="0" cy="0" rx="80" ry="30" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="12" text-anchor="middle">View Recommendations</text>
  </g>

  <g transform="translate(400, 360)">
    <ellipse cx="0" cy="0" rx="80" ry="30" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="12" text-anchor="middle">Save Favorites</text>
  </g>
  
  <g transform="translate(400, 440)">
    <ellipse cx="0" cy="0" rx="80" ry="30" fill="white" stroke="#333" stroke-width="1.5" />
    <text x="0" y="5" font-family="Arial" font-size="12" text-anchor="middle">Search Pantry</text>
  </g>

  <!-- Connections -->
  <line x1="120" y1="250" x2="320" y2="120" stroke="#333" stroke-width="1.5" />
  <line x1="120" y1="250" x2="320" y2="200" stroke="#333" stroke-width="1.5" />
  <line x1="120" y1="250" x2="320" y2="280" stroke="#333" stroke-width="1.5" />
  <line x1="120" y1="250" x2="320" y2="360" stroke="#333" stroke-width="1.5" />
  <line x1="120" y1="250" x2="320" y2="440" stroke="#333" stroke-width="1.5" />

  <!-- Secondary Connections -->
  <line x1="480" y1="120" x2="680" y2="150" stroke="#333" stroke-width="1.5" />
  <line x1="480" y1="200" x2="680" y2="350" stroke="#333" stroke-width="1.5" />

  <!-- Include/Extend -->
  <!-- Voice includes Text -->
  <path d="M400,170 L400,150" stroke="#333" stroke-width="1" stroke-dasharray="5,5" marker-end="url(#dash-arrow)" />
  <text x="410" y="165" font-family="Arial" font-size="10" fill="#444">&lt;&lt;include&gt;&gt;</text>

  <!-- View Recs extends Favorites -->
  <path d="M400,330 L400,310" stroke="#333" stroke-width="1" stroke-dasharray="5,5" marker-end="url(#dash-arrow)" />
  <text x="410" y="325" font-family="Arial" font-size="10" fill="#444">&lt;&lt;extend&gt;&gt;</text>

</svg>
