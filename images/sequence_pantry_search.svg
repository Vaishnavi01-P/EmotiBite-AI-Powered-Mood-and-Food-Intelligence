<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid White Background -->
  <rect width="100%" height="100%" fill="white" />

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
    <marker id="dash-arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>
  
  <text x="400" y="30" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Sequence Diagram: Pantry Recipe Search</text>

  <!-- Lifelines -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="80" height="30" fill="#f0f0f0" stroke="#333" stroke-width="1.5" />
    <text x="40" y="20" font-family="Arial" font-size="12" text-anchor="middle">User</text>
    <line x1="40" y1="30" x2="40" y2="550" stroke="#333" stroke-width="1" stroke-dasharray="5,5" />
  </g>

  <g transform="translate(200, 60)">
    <rect x="0" y="0" width="80" height="30" fill="#f0f0f0" stroke="#333" stroke-width="1.5" />
    <text x="40" y="20" font-family="Arial" font-size="12" text-anchor="middle">Frontend</text>
    <line x1="40" y1="30" x2="40" y2="550" stroke="#333" stroke-width="1" stroke-dasharray="5,5" />
     <rect x="35" y="80" width="10" height="420" fill="#eee" stroke="#666" stroke-width="1" />
  </g>

  <g transform="translate(400, 60)">
    <rect x="0" y="0" width="80" height="30" fill="#f0f0f0" stroke="#333" stroke-width="1.5" />
    <text x="40" y="20" font-family="Arial" font-size="12" text-anchor="middle">Backend</text>
    <line x1="40" y1="30" x2="40" y2="550" stroke="#333" stroke-width="1" stroke-dasharray="5,5" />
    <rect x="35" y="140" width="10" height="320" fill="#eee" stroke="#666" stroke-width="1" />
  </g>
  
  <g transform="translate(600, 60)">
    <rect x="0" y="0" width="80" height="30" fill="#f0f0f0" stroke="#333" stroke-width="1.5" />
    <text x="40" y="20" font-family="Arial" font-size="12" text-anchor="middle">Database</text>
    <line x1="40" y1="30" x2="40" y2="550" stroke="#333" stroke-width="1" stroke-dasharray="5,5" />
  </g>

  <!-- Messages -->
  <!-- 1. Enter Ingredients -->
  <line x1="90" y1="90" x2="235" y2="90" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="162" y="85" font-family="Arial" font-size="11" text-anchor="middle">enterIngredients()</text>
  
  <!-- 2. Find -->
  <line x1="90" y1="120" x2="235" y2="120" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="162" y="115" font-family="Arial" font-size="11" text-anchor="middle">clickFindRecipes()</text>

  <!-- 3. Tokenize (Self) -->
  <path d="M245,130 L265,130 L265,140 L245,140" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="270" y="135" font-family="Arial" font-size="11" text-anchor="start">tokenizeInput()</text>

  <!-- 4. POST -->
  <line x1="245" y1="160" x2="435" y2="160" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="340" y="155" font-family="Arial" font-size="11" text-anchor="middle">POST /api/recipes/pantry</text>
  
  <!-- 5. Remove (Self) -->
  <path d="M445,170 L465,170 L465,180 L445,180" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="470" y="175" font-family="Arial" font-size="11" text-anchor="start">removeStopwords()</text>

  <!-- 6. Find DB -->
  <line x1="445" y1="210" x2="640" y2="210" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="542" y="205" font-family="Arial" font-size="11" text-anchor="middle">find({ingredients...})</text>
  
  <!-- 7. Return DB -->
  <line x1="640" y1="240" x2="445" y2="240" stroke="#333" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#dash-arrow)" />
  <text x="542" y="235" font-family="Arial" font-size="11" text-anchor="middle">[{recipe1}, {recipe2}...]</text>
  
  <!-- 8. Calculate (Self) -->
  <path d="M445,260 L465,260 L465,270 L445,270" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="470" y="265" font-family="Arial" font-size="11" text-anchor="start">calculateMatchScores()</text>
  
  <!-- 9. Filter (Self) -->
  <path d="M445,300 L465,300 L465,310 L445,310" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="470" y="305" font-family="Arial" font-size="11" text-anchor="start">filterByThreshold()</text>
  
  <!-- 10. Sort (Self) -->
  <path d="M445,340 L465,340 L465,350 L445,350" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="470" y="345" font-family="Arial" font-size="11" text-anchor="start">sortByScore()</text>
  
  <!-- 11. Response -->
  <line x1="435" y1="390" x2="245" y2="390" stroke="#333" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#dash-arrow)" />
  <text x="340" y="385" font-family="Arial" font-size="11" text-anchor="middle">200 OK {recipes...}</text>
  
  <!-- 12. Render -->
  <line x1="235" y1="430" x2="90" y2="430" stroke="#333" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#dash-arrow)" />
  <text x="162" y="425" font-family="Arial" font-size="11" text-anchor="middle">Render Cards</text>

</svg>
