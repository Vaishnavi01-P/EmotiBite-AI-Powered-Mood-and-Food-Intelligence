<svg width="600" height="1100" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="100%" height="100%" fill="white" />
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>

  <text x="300" y="30" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Activity Diagram: User Registration</text>

  <!-- Start Node -->
  <circle cx="300" cy="50" r="10" fill="#333" />
  <line x1="300" y1="60" x2="300" y2="80" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Action 1 -->
  <rect x="200" y="80" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="300" y="105" font-family="Arial" font-size="11" text-anchor="middle">Navigate to Register</text>
  <line x1="300" y1="120" x2="300" y2="150" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Action 2 -->
  <rect x="200" y="150" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="300" y="175" font-family="Arial" font-size="11" text-anchor="middle">Enter Info and Submit</text>
  <line x1="300" y1="190" x2="300" y2="220" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Decision 1: Valid? -->
  <polygon points="300,220 400,260 300,300 200,260" fill="#fff" stroke="#333" stroke-width="1.5" />
  <text x="300" y="265" font-family="Arial" font-size="11" text-anchor="middle">Valid Email/Pwd?</text>
  
  <!-- Loop back (Invalid) -->
  <text x="180" y="250" font-family="Arial" font-size="10" text-anchor="end">No</text>
  <line x1="200" y1="260" x2="150" y2="260" stroke="#333" stroke-width="1.5" />
  <line x1="150" y1="260" x2="150" y2="170" stroke="#333" stroke-width="1.5" />
  <line x1="150" y1="170" x2="200" y2="170" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Yes Path -->
  <text x="310" y="315" font-family="Arial" font-size="10" text-anchor="start">Yes</text>
  <line x1="300" y1="300" x2="300" y2="330" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- POST -->
  <rect x="200" y="330" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="300" y="355" font-family="Arial" font-size="11" text-anchor="middle">POST /register</text>
  <line x1="300" y1="370" x2="300" y2="400" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Decision 2: Reachable? -->
  <polygon points="300,400 380,440 300,480 220,440" fill="#fff" stroke="#333" stroke-width="1.5" />
  <text x="300" y="445" font-family="Arial" font-size="11" text-anchor="middle">Reachable?</text>
  
  <!-- Demo Mode path -->
  <text x="210" y="430" font-family="Arial" font-size="10" text-anchor="end">No</text>
  <line x1="220" y1="440" x2="125" y2="440" stroke="#333" stroke-width="1.5" />
  <line x1="125" y1="440" x2="125" y2="470" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  
  <rect x="50" y="470" width="150" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="125" y="495" font-family="Arial" font-size="11" text-anchor="middle">Switch to Demo Mode</text>
  
  <circle cx="125" cy="550" r="10" fill="#333" /> <!-- End Demo -->
  <circle cx="125" cy="550" r="14" fill="none" stroke="#333" stroke-width="2" />
  <line x1="125" y1="510" x2="125" y2="536" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Check Email Path -->
  <text x="310" y="495" font-family="Arial" font-size="10" text-anchor="start">Yes</text>
  <line x1="300" y1="480" x2="300" y2="510" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="200" y="510" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="300" y="535" font-family="Arial" font-size="11" text-anchor="middle">Query DB (Check Email)</text>
  <line x1="300" y1="550" x2="300" y2="580" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Decision 3: Exists? -->
  <polygon points="300,580 380,620 300,660 220,620" fill="#fff" stroke="#333" stroke-width="1.5" />
  <text x="300" y="625" font-family="Arial" font-size="11" text-anchor="middle">Email Exists?</text>

  <!-- Loop back (Exists) -->
  <text x="390" y="610" font-family="Arial" font-size="10" text-anchor="start">Yes</text>
  <line x1="380" y1="620" x2="450" y2="620" stroke="#333" stroke-width="1.5" />
  <line x1="450" y1="620" x2="450" y2="170" stroke="#333" stroke-width="1.5" />
  <line x1="450" y1="170" x2="400" y2="170" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Create Path -->
  <text x="310" y="675" font-family="Arial" font-size="10" text-anchor="start">No</text>
  <line x1="300" y1="660" x2="300" y2="690" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="200" y="690" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="300" y="715" font-family="Arial" font-size="11" text-anchor="middle">Hash Pwd and Create Doc</text>
  <line x1="300" y1="730" x2="300" y2="760" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  
  <rect x="200" y="760" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="300" y="785" font-family="Arial" font-size="11" text-anchor="middle">Insert into DB</text>
  <line x1="300" y1="800" x2="300" y2="830" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />
  
  <rect x="200" y="830" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="300" y="855" font-family="Arial" font-size="11" text-anchor="middle">Return Success</text>
  <line x1="300" y1="870" x2="300" y2="900" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="200" y="900" width="200" height="40" rx="10" ry="10" fill="#f9f9f9" stroke="#333" stroke-width="1.5" />
  <text x="300" y="925" font-family="Arial" font-size="11" text-anchor="middle">Redirect to Login</text>
  <line x1="300" y1="940" x2="300" y2="970" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- End Node -->
  <circle cx="300" cy="980" r="10" fill="#333" />
  <circle cx="300" cy="980" r="14" fill="none" stroke="#333" stroke-width="2" />

</svg>
